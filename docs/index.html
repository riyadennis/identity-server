<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Documentation Index</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.12/swagger-ui.css" />
  <style>
    body { font-family: Arial, sans-serif; padding: 32px; }
    #links { margin-bottom: 2em; }
    #links h1 { margin-bottom: 16px; }
    .api-nav { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
    .api-nav a {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 5px;
      font-size: 1em;
      font-weight: bold;
      text-decoration: none;
      border: 2px solid transparent;
      transition: background 0.15s, color 0.15s;
    }
    .api-nav a.rest {
      background: #89bf04;
      color: white;
    }
    .api-nav a.rest:hover {
      background: #6fa000;
    }
    .api-nav a.graphql {
      background: #e10098;
      color: white;
    }
    .api-nav a.graphql:hover {
      background: #b3007a;
    }
    ul { font-size: 1.1em; }
  </style>
</head>
<body>
  <div id="links">
    <h1>API Documentation</h1>
    <nav class="api-nav">
      <a class="rest" href="#swagger-ui">REST API</a>
      <a class="graphql" href="graphql.html">GraphQL API</a>
    </nav>
  </div>
  <div id="swagger-ui"></div>
  <script src="swagger-ui-bundle.js"></script>
  <script>
    window.onload = function() {
      window.ui = SwaggerUIBundle({
        url: "swagger.json",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis],
        layout: "BaseLayout",
      });
    };
  </script>
</body>
</html>
