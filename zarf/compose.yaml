name: identity-server

services:
  mysql-server:
    image: mysql:8.0
    ports:
      - 3306:3306
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=identity-server
      - MYSQL_USER=identity-server
      - MYSQL_PASSWORD=password
    volumes:
      # Renamed from mysql-data to avoid sharing the volume with dashboard/docker-compose.yml.
      - identity_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "identity-server", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
  go-server:
    restart: on-failure
    develop:
      watch:
        - action: sync
          path: ../
          target: /home/webuser
        - action: rebuild
          path: go.mod
    build:
      context: ../
      dockerfile: Dockerfile
    ports:
      - 8095:8095
    environment:
      - ENV=dev
      - REST_PORT=8095
      - MYSQL_USERNAME=identity-server
      - MYSQL_PASSWORD=password
      - MYSQL_HOST=mysql-server
      - MYSQL_DATABASE=identity-server
      - MYSQL_PORT=3306
      - ISSUER=open source
      #  needs trailing slash
      - KEY_PATH=/var/folders/
      - MIGRATION_PATH=/home/webuser/migrations
    depends_on:
      mysql-server:
        condition: service_healthy
    links:
      - mysql-server
    volumes:
      - identity_key_data:/var/folders
  go-grpc-server:
    restart: on-failure
    develop:
      watch:
        - action: sync
          path: ../
          target: /home/webuser
        - action: rebuild
          path: go.mod
    build:
      context: ../
      dockerfile: ../identity-server/app/proto/GRPCDockerfile
    ports:
      - 8096:8096
    environment:
      - ENV=dev
      - GRPC_PORT=8096
      - MYSQL_USERNAME=identity-server
      - MYSQL_PASSWORD=password
      - MYSQL_HOST=mysql-server
      - MYSQL_DATABASE=identity-server
      - MYSQL_PORT=3306
      - ISSUER=open source
      # needs trailing slash
      - KEY_PATH=/var/folders/
      - MIGRATION_PATH=/home/webuser/migrations
    depends_on:
      mysql-server:
        condition: service_healthy
    links:
      - mysql-server
    volumes:
      - identity_key_data:/var/folders
  go-gql-server:
    restart: on-failure
    develop:
      watch:
        - action: sync
          path: ../
          target: /home/webuser
        - action: rebuild
          path: go.mod
    build:
      context: ../
      dockerfile: ../identity-server/app/gql/GQLDockerfile
    ports:
      - 8097:8097
    environment:
      - ENV=dev
      - GRAPHQL_PORT=8097
      - MYSQL_USERNAME=identity-server
      - MYSQL_PASSWORD=password
      - MYSQL_HOST=mysql-server
      - MYSQL_DATABASE=identity-server
      - MYSQL_PORT=3306
      - ISSUER=open source
      # needs trailing slash
      - KEY_PATH=/var/folders/
      - MIGRATION_PATH=/home/webuser/migrations
    depends_on:
      mysql-server:
        condition: service_healthy
    links:
      - mysql-server
    volumes:
      - identity_key_data:/var/folders
volumes:
  # Renamed from mysql-data / key-data to avoid collisions with dashboard/docker-compose.yml.
  identity_mysql_data:
  identity_key_data:
