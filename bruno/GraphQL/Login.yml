info:
  name: Login
  type: graphql
  seq: 2

graphql:
  method: POST
  url: http://localhost:8097/graphql
  headers:
    - name: Content-Type
      value: application/json
  body:
    operationName: Login
    query: |
      mutation Login($input: LoginInput!) {
        Login(input: $input) {
          status
          accessToken
          expiry
          tokenType
          lastRefresh
          tokenTTL
        }
      }
    variables: |-
      {
        "input": {
          "email": "riya@example.com",
          "password": "SecurePassword123!"
        }
      }
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
