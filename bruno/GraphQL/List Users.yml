info:
  name: List Users
  type: graphql
  seq: 3

graphql:
  method: POST
  url: "{{base_url}}/graphql"
  body:
    query: |
      query listUsers {
        listUsers {
          id
          email
          name
          picture
          emailVerified
        }
      }
  auth:
    type: bearer
    token: "{{access_token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
